<!DOCTYPE html>
  <html lang = "en"> 
    <head>
      <meta charset = "UTF-8">
        <title> Tic Tac Toe </title>
  <link href = "https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel = "stylesheet">
  link rel = "stylesheet" href = "styles.css" />
</head>
  <body>
    <div class = "container">
      <!-- Title -->
  <h1> Game of Tic Tac Toe!!</h1>
        <!-- Title -->

 
  <p id = "status">Player one's turn (X) </p>
      <!-- Player turn display -->

  <div class = "display">
    <span class = "display-player player-x" >X</span>'s turn
    <div>

    <!-- 3 X 3 game board-->
     <div class = "board">
     <!-- Nine tiles, the index is used in the scrupt-->
    <div class = "cell" id = "0"></div>
    <div class = "cell" id = "1"></div>
    <div class = "cell" id = "2"></div>
    <div class = "cell" id = "3"></div>
    <div class = "cell" id = "4"></div>
    <div class = "cell" id = "5"></div>
    <div class = "cell" id = "6"></div>
    <div class = "cell" id = "7"></div>
    <div class = "cell" id = "8"></div>
  </div>

  <!-- end game announcement (hidden until needed)-->
   <
  <button id = "reset"
   class = "reset-btn" >Reset Game</button>

  <script src = "script.js" defer></script>
    </body>
</html>
