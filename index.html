<!DOCTYPE html>
  <html lang = "en"> 
    <head>
      <meta charset = "UTF-8">
        <title> Tic Tac Toe </title>
      <!-- google fonts -->
  <link href = "https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel = "stylesheet">
  <link rel = "stylesheet" href = "styles.css" />
</head>
  <body>
    <div class = "container">
      <!-- Title -->
  <h1> Game of Tic Tac Toe!</h1>
 
    <!-- Player turn display (between 2 players) -->
  <div class = "display">
    <span class = "display-player player-x" >X</span>'s turn
    <div>

    <!-- 3 X 3 game board-->
     <div class = "board">
     <!-- Nine tiles, the index is used in the script-->
    <div class = "cell" id = "0"></div>
    <div class = "cell" id = "1"></div>
    <div class = "cell" id = "2"></div>
    <div class = "cell" id = "3"></div>
    <div class = "cell" id = "4"></div>
    <div class = "cell" id = "5"></div>
    <div class = "cell" id = "6"></div>
    <div class = "cell" id = "7"></div>
    <div class = "cell" id = "8"></div>

      <!-- end game announcement (hidden until needed)-->
     </div id = "announcement" class = "hide"></div>

   <!-- Reset button -->
    <div class = "controls">
    <button class = "reset"></button>Reset</button>
     </div>
  <div>

<!-- load the game script-->   

  <script src = "index.js" defer></script>
    </body>
</html>
